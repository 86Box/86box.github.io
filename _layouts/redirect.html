<!doctype html>
<html>
	<head>
		<title>{{ page.title }}</title>
		<meta http-equiv="refresh" content="0;URL={{ page.redirect.to | replace: site.url, "" }}">
		<script language="javascript"><!--
			location.href = '{{ page.redirect.to | replace: site.url, "" }}';
		--></script>
	</head>
	<body>
		<h1><a href="{{ page.redirect.to | replace: site.url, "" }}">{{ page.title | default: "Click here if you're not redirected." }}</a></h1>
	</body>
</html>
